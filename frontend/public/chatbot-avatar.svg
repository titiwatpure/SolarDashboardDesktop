<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" style="image-rendering: pixelated;">
  <!-- Background -->
  <rect width="64" height="64" fill="#1E40AF" rx="12"/>
  
  <!-- Robot Body -->
  <rect x="20" y="18" width="24" height="28" fill="#60A5FA" rx="4"/>
  
  <!-- Robot Head -->
  <rect x="22" y="8" width="20" height="14" fill="#93C5FD" rx="3"/>
  
  <!-- Eyes -->
  <rect x="26" y="12" width="4" height="4" fill="#1E3A5F"/>
  <rect x="34" y="12" width="4" height="4" fill="#1E3A5F"/>
  
  <!-- Eye shine -->
  <rect x="27" y="13" width="2" height="2" fill="white"/>
  <rect x="35" y="13" width="2" height="2" fill="white"/>
  
  <!-- Mouth -->
  <rect x="28" y="18" width="8" height="2" fill="#1E3A5F"/>
  
  <!-- Antenna -->
  <rect x="30" y="2" width="4" height="6" fill="#F59E0B"/>
  <circle cx="32" cy="2" r="3" fill="#F59E0B"/>
  
  <!-- Arms -->
  <rect x="12" y="24" width="8" height="4" fill="#60A5FA" rx="2"/>
  <rect x="44" y="24" width="8" height="4" fill="#60A5FA" rx="2"/>
  
  <!-- Laptop -->
  <rect x="16" y="32" width="32" height="16" fill="#374151" rx="2"/>
  <rect x="18" y="34" width="28" height="10" fill="#60A5FA"/>
  
  <!-- Screen content -->
  <rect x="22" y="36" width="8" height="2" fill="white"/>
  <rect x="22" y="40" width="12" height="2" fill="white"/>
  <rect x="22" y="44" width="6" height="2" fill="white"/>
  
  <!-- Coffee cup -->
  <rect x="52" y="28" width="6" height="8" fill="#F59E0B" rx="1"/>
  <rect x="54" y="26" width="4" height="2" fill="#F59E0B"/>
  
  <!-- Steam -->
  <rect x="53" y="22" width="2" height="2" fill="white" opacity="0.7"/>
  <rect x="55" y="20" width="2" height="2" fill="white" opacity="0.5"/>
  
  <!-- Document -->
  <rect x="6" y="30" width="8" height="10" fill="white" rx="1"/>
  <rect x="8" y="32" width="4" height="1" fill="#9CA3AF"/>
  <rect x="8" y="35" width="6" height="1" fill="#9CA3AF"/>
  <rect x="8" y="38" width="4" height="1" fill="#9CA3AF"/>
</svg>
